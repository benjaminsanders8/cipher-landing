<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Specialty-grade healthcare analytics for commercially insured employers.">
  <title>Cipher Health Analytics</title>
  <link rel="icon" type="image/png" href="cipher-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #335772;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .content {
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .logo {
      width: 280px;
      max-width: 80vw;
      margin-bottom: 16px;
    }

    .subtitle {
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #7F8C8D;
      font-size: 14px;
      font-weight: 300;
      margin-bottom: 32px;
    }

    .divider {
      width: 60px;
      height: 2px;
      background-color: #3A7CA5;
      margin: 0 auto 32px;
    }

    .coming-soon {
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #4A5B6C;
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 16px;
    }

    .email a {
      color: #3A7CA5;
      text-decoration: none;
      font-size: 13px;
      font-weight: 300;
    }

    .email a:hover {
      text-decoration: underline;
    }

    .star {
      position: fixed;
      bottom: 24px;
      right: 24px;
    }

    .star svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="content">
    <img src="cipher-logo.png" alt="Cipher Health Analytics" class="logo">
    <p class="subtitle">Healthcare Analytics</p>
    <div class="divider"></div>
    <p class="coming-soon">Coming Soon</p>
    <p class="email"><a href="mailto:ben@cipherhealthanalytics.com">ben@cipherhealthanalytics.com</a></p>
  </div>

  <div class="star">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L13.5 10.5L22 12L13.5 13.5L12 22L10.5 13.5L2 12L10.5 10.5L12 2Z" fill="#4A5B6C"/>
    </svg>
  </div>
</body>
</html>
