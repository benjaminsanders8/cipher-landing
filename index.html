<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Specialty-grade healthcare analytics for commercially insured employers.">
  <title>Cipher Health Analytics</title>
  <link rel="icon" type="image/png" href="cipher-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #27435E;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .content {
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .logo {
      width: 420px;
      max-width: 80vw;
      margin-bottom: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .subtitle {
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #A0B0BC;
      font-size: 14px;
      font-weight: 300;
      margin-bottom: 32px;
    }

    .divider {
      width: 60px;
      height: 2px;
      background-color: #3A7CA5;
      margin: 0 auto 32px;
    }

    .coming-soon {
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #8A9BAC;
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 28px;
    }

    .prototype-btn {
      display: inline-block;
      padding: 12px 32px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 6px;
      color: #FFFFFF;
      background: transparent;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.25s ease;
      margin-bottom: 28px;
    }

    .prototype-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.45);
    }

    .email a {
      color: #5BA3CC;
      text-decoration: none;
      font-size: 13px;
      font-weight: 300;
    }

    .email a:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body>
  <div class="content">
    <img src="cipher-logo.png" alt="Cipher Health Analytics" class="logo">
    <p class="subtitle">Healthcare Analytics</p>
    <div class="divider"></div>
    <p class="coming-soon">Coming Soon</p>
    <a href="https://app.cipherhealthanalytics.com" class="prototype-btn">View Prototype</a>
    <br>
    <p class="email"><a href="mailto:ben@cipherhealthanalytics.com">ben@cipherhealthanalytics.com</a></p>
  </div>
</body>
</html>
